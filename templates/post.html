<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --primary: #10b981;
            --primary-hover: #059669;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc;
            --text-secondary: #64748b;
            --glow: 0 0 25px rgba(16, 185, 129, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #111e1f, #0b0f19);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        /* Nav back */
        .back-link {
            display: inline-block;
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-4px);
        }

        /* Post Header */
        header {
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 2rem;
        }

        .post-title {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .post-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .tags-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .tag-badge {
            font-size: 0.65rem;
            font-weight: 800;
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            padding: 0.25rem 0.65rem;
            border-radius: 50px;
            text-decoration: none;
            text-transform: uppercase;
        }

        /* Article markup styling (parsed markdown) */
        article {
            line-height: 1.7;
            font-size: 1.1rem;
            color: #cbd5e1;
        }

        article h1, article h2, article h3 {
            color: var(--text-primary);
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        article h1 { font-size: 2rem; }
        article h2 { font-size: 1.5rem; }
        article h3 { font-size: 1.25rem; }

        article p {
            margin-bottom: 1.5rem;
        }

        article strong {
            color: var(--primary);
        }

        article code {
            font-family: monospace;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.95em;
            color: #ec4899;
        }

        article ul {
            margin-left: 2rem;
            margin-bottom: 1.5rem;
        }

        article li {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            
            <a href="/" class="back-link">← Return to Articles Index</a>

            <header>
                <h1 class="post-title">{{ post.title }}</h1>
                <div class="post-meta">
                    <span>Published: {{ post.date }}</span>
                    <span>{{ post.reading_time }} min read</span>
                </div>
                <div class="tags-row">
                    {% for tag in post.tags %}
                        <span class="tag-badge">{{ tag }}</span>
                    {% endfor %}
                </div>
            </header>

            <article>
                {{ html_content | safe }}
            </article>

        </div>
    </div>
</body>
</html>
